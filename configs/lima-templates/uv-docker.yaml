base:
- template:base-docker

provision:
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Install uv
      curl -LsSf https://astral.sh/uv/install.sh | sh
      # Add uv to PATH for this script
      export PATH="$HOME/.local/bin:$PATH"
      # Install latest stable Python via uv
      uv python install

      # Expose uv/uvx system-wide so login/non-login/non-interactive shells
      # all see them, not just shells that source ~/.profile (which adds
      # ~/.local/bin to PATH). Same reasoning as the node-docker template.
      for bin in uv uvx; do
        if [ -x "$HOME/.local/bin/$bin" ]; then
          sudo ln -sf "$HOME/.local/bin/$bin" "/usr/local/bin/$bin"
        fi
      done

# portForwards intentionally omitted: orchestrator-spawned workers are
# headless and host ports would collide across parallel VMs. If you need
# a dev server visible to the host, create the VM with an explicit port
# override or use a dedicated non-worker VM.
