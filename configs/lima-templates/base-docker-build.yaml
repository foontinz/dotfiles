# Build-time template — used only by build-base-image.bash
# This creates a fully provisioned VM whose disk gets exported as the base image.
disk: 40GiB

# Skip Lima's built-in rootless containerd + buildkit setup. We install the
# standard Docker engine via apt-get below, so Lima's cidata step is redundant
# and adds ~5 min to every build + every VM start.
containerd:
  system: false
  user: false

base:
- template:_images/ubuntu-lts

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Install Docker
      apt-get update
      apt-get install -y ca-certificates curl gnupg libatomic1 \
        build-essential pkg-config
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
        > /etc/apt/sources.list.d/docker.list
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io \
        docker-buildx-plugin docker-compose-plugin
      usermod -aG docker {{.User}}

      # Install GitHub CLI
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
        | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
        https://cli.github.com/packages stable main" \
        > /etc/apt/sources.list.d/github-cli.list
      apt-get update
      apt-get install -y gh

  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Pre-populate GitHub known_hosts
      mkdir -p ~/.ssh
      ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      # Git config
      git config --global user.name "Dmytro Yurinov"
      git config --global user.email "foontinz@protonmail.com"

      # Install Claude Code
      curl -fsSL https://claude.ai/install.sh | bash

      # Skip onboarding (Claude Code is API-key-driven via ANTHROPIC_API_KEY)
      cat > ~/.claude.json << 'CLAUDE_EOF'
      {
        "hasCompletedOnboarding": true
      }
      CLAUDE_EOF

      # Claude aliases
      echo 'alias claude="claude --allow-dangerously-skip-permissions"' >> ~/.bashrc
      echo 'alias cc="claude"' >> ~/.bashrc

      # Dangling symlinks into host mounts — targets become valid at runtime
      # when base-docker.yaml mounts ~/.ssh.
      ln -sf /Users/barbos/.ssh/id_ed25519 ~/.ssh/id_ed25519
      ln -sf /Users/barbos/.ssh/id_ed25519.pub ~/.ssh/id_ed25519.pub

      # Source host-managed env vars (GH_TOKEN, ANTHROPIC_API_KEY,
      # ANTHROPIC_BASE_URL, etc.) on shell start. ANTHROPIC_API_KEY disables
      # OAuth in Claude Code (auth.ts:143), so Meridian proxies via
      # ANTHROPIC_BASE_URL transparently.
      #
      # Appended to .profile *and* .bashrc because Ubuntu's default .bashrc
      # early-returns for non-interactive shells — `bash -lc` and subprocess
      # spawns from claude/gh would otherwise never see these vars.
      SOURCE_LINE='[ -f /Users/barbos/.config/lima-secrets/env ] && source /Users/barbos/.config/lima-secrets/env'
      echo "$SOURCE_LINE" >> ~/.bashrc
      echo "$SOURCE_LINE" >> ~/.profile
