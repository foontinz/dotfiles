# Runtime base — uses pre-built image from build-base-image.bash
# No provisioning needed, everything is baked into the disk image.
#
# Host prerequisite: ~/.config/lima-secrets/env contains exports like:
#   export GH_TOKEN="ghp_..."
#   export ANTHROPIC_API_KEY="x"
#   export ANTHROPIC_BASE_URL="http://host.lima.internal:3456"  # Meridian proxy
disk: 40GiB

# Skip Lima's rootless containerd setup — our baked image already has Docker
# via apt-get. Without this, every VM start re-runs cidata's install-buildkit
# step which can take minutes.
containerd:
  system: false
  user: false

images:
  - location: "~/.lima/_images/base-docker.img"
    arch: "aarch64"

mounts:
  - location: "~/.ssh"
    writable: false
  - location: "~/.config/lima-secrets"
    writable: false
