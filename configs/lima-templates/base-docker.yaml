# Runtime base — uses pre-built image from build-base-image.bash
# No provisioning needed, everything is baked into the disk image.
disk: 40GiB

images:
  - location: "~/.lima/_images/base-docker.img"
    arch: "aarch64"

mounts:
  - location: "~/.ssh"
    writable: false

provision:
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      # Symlink host SSH keys into guest user's home
      ln -sf /Users/barbos/.ssh/id_ed25519 ~/.ssh/id_ed25519
      ln -sf /Users/barbos/.ssh/id_ed25519.pub ~/.ssh/id_ed25519.pub
